name: Main

on:
  push: { branches: ["main"] }
  pull_request:
  workflow_dispatch: # Can run manually from the Actions tab

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: git-lfs-hub/ci-cd/actions/init-bun@main

      - uses: git-lfs-hub/ci-cd/actions/init-vars@main
        with:
          vars-json: ${{ env.GLH_VARS_JSON || vars.GLH_VARS_JSON || secrets.GLH_VARS_JSON }}

      - run: bun run build
